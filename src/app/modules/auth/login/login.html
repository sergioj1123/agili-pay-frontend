<div class="login-container">
  <div class="login-aside">
    <div class="login-image-container">
      <h1>
        <img src="/logo.svg" alt="Agilipay Logo" class="logo" />
      </h1>
    </div>
    <p>A gestão financeira ágil para o seu negócio freelancer.</p>
  </div>

  <div class="login-form-section">
    <form class="login-form">
      <!-- <div class="login-image-container">
        <h1>
          <img src="/logo.svg" alt="Agilipay Logo" class="logo" />
        </h1>
      </div> -->
      <h2 class="login-form__title">Bem-vindo de volta ao AgiliPay</h2>

      <div class="login-form__container">
        <input-field
          label="E-mail"
          type="email"
          placeholder="seu@email.com"
          icon="email"
          [control]="emailControl"
        ></input-field>

        <input-field
          label="Senha"
          type="password"
          icon="lock"
          [control]="passwordControl"
        ></input-field>
      </div>

      <div class="button-group">
        <a href="#" class="forgot-password">Esqueceu a senha?</a>

        <app-button
          variant="primary"
          [fullWidth]="true"
          (click)="login()"
          [disabled]="!loginForm.valid"
          >Entrar</app-button
        >
        <div class="signUp">
          <span>Não tem uma conta? </span>
          <a routerLink="/auth/signup">Cadastre-se</a>
        </div>
      </div>
    </form>
  </div>
</div>
